name: Spring Boot CI Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

    # 1️⃣ Checkout the code from GitHub
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2️⃣ Setup Java
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: maven

    # 3️⃣ Verify Maven Installation
    - name: Verify Maven
      run: mvn -version

    # 4️⃣ Build the Application
    - name: Build Spring Boot Application
      run: mvn clean compile

    # 5️⃣ Run Unit Tests
    - name: Run Unit Tests
      run: mvn test

    # 6️⃣ Package the JAR File
    - name: Package Application
      run: mvn package -DskipTests

    # 7️⃣ Upload JAR Artifact
    - name: Upload JAR Artifact
      uses: actions/upload-artifact@v4
      with:
        name: springboot-jar
        path: target/*.jar
